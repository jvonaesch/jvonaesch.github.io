{% assign pages = site.data.pages[include.nav] %}

<p>

  {% if pages[0].url %}
    <a href="{{ pages[0].url | relative_url }}">{{ pages[0].title }}</a>
  {% endif %}

  {% for page in pages offset:1 %}
      {% if page.url %}
          &nbsp;|&nbsp;<a href="{{ page.url | relative_url }}">{{ page.title }}</a>
      {% endif %}
  {% endfor %}

</p>
