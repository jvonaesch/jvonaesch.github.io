{% assign pages = site.data.pages[page.pagebar] %}

{% if pages.size > 1 %}
  {% for page in pages%}
    {% if page.gray %}
      <button class="page-bar-link hover-gray", onclick="location.href='{{ page.url | relative_url }}'">
        {{ page.title }}
      </button>
    {% else %}
      <button class="page-bar-link hover-color", onclick="location.href='{{ page.url | relative_url }}'">
        {{ page.title }}
      </button>
    {% endif %}
  {% endfor %}
{% endif %}
