{% assign pages = site.data.pages[page.pagebar] %}

{% if pages.size > 1 %}
  {% for page in pages%}
    {% if page.url %}
      <button class="page-bar-link", onclick="location.href='{{ page.url | relative_url }}'">
        {{ page.title }}
      </button>
    {% endif %}
  {% endfor %}
{% endif %}
